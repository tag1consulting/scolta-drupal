search:
  version: VERSION
  js:
    # Path resolves to the tag1/scolta-php Composer package's assets directory.
    # Platforms using Composer will have this at vendor/tag1/scolta-php/assets/js/scolta.js.
    # For development, symlink or copy the JS into the module's directory.
    js/scolta.js: { type: external, minified: false }
  css:
    theme:
      css/scolta.css: {}

drupal_bridge:
  version: VERSION
  js:
    js/scolta-drupal-bridge.js: {}
  dependencies:
    - core/drupal
    - core/drupalSettings
    - scolta/search
