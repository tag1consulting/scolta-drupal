scolta.settings:
  type: config_object
  label: 'Scolta settings'
  mapping:
    ai_provider:
      type: string
      label: 'AI provider'
    ai_model:
      type: string
      label: 'AI model'
    ai_base_url:
      type: string
      label: 'AI base URL'
    ai_expand_query:
      type: boolean
      label: 'Enable AI query expansion'
    ai_summarize:
      type: boolean
      label: 'Enable AI summarization'
    ai_languages:
      type: sequence
      label: 'AI response languages'
      sequence:
        type: string
        label: 'Language code'
    max_follow_ups:
      type: integer
      label: 'Maximum follow-up questions'
    site_name:
      type: string
      label: 'Site name'
    site_description:
      type: string
      label: 'Site description'
    scoring:
      type: mapping
      label: 'Scoring configuration'
      mapping:
        title_match_boost:
          type: float
          label: 'Title match boost'
        title_all_terms_multiplier:
          type: float
          label: 'Title all terms multiplier'
        content_match_boost:
          type: float
          label: 'Content match boost'
        recency_boost_max:
          type: float
          label: 'Recency boost maximum'
        recency_half_life_days:
          type: integer
          label: 'Recency half-life in days'
        recency_penalty_after_days:
          type: integer
          label: 'Recency penalty after days'
        recency_max_penalty:
          type: float
          label: 'Recency maximum penalty'
        expand_primary_weight:
          type: float
          label: 'Expanded term primary weight'
        language:
          type: string
          label: 'Scoring language'
        custom_stop_words:
          type: sequence
          label: 'Custom stop words'
          sequence:
            type: string
            label: 'Stop word'
        recency_strategy:
          type: string
          label: 'Recency strategy'
        recency_curve:
          type: sequence
          label: 'Custom recency curve control points'
          sequence:
            type: sequence
            label: 'Control point [days, boost]'
            sequence:
              type: float
              label: 'Value'
    display:
      type: mapping
      label: 'Display configuration'
      mapping:
        excerpt_length:
          type: integer
          label: 'Excerpt length'
        results_per_page:
          type: integer
          label: 'Results per page'
        max_pagefind_results:
          type: integer
          label: 'Maximum Pagefind results'
        ai_summary_top_n:
          type: integer
          label: 'AI summary top N results'
        ai_summary_max_chars:
          type: integer
          label: 'AI summary max characters'
    cache_ttl:
      type: integer
      label: 'Cache TTL in seconds'
    prompt_expand_query:
      type: string
      label: 'Custom expand query prompt'
    prompt_summarize:
      type: string
      label: 'Custom summarize prompt'
    prompt_follow_up:
      type: string
      label: 'Custom follow-up prompt'
    indexer:
      type: string
      label: 'Indexer mode (auto, php, or binary)'
    memory_budget:
      type: mapping
      label: 'Memory budget configuration'
      mapping:
        profile:
          type: string
          label: 'Memory budget profile (conservative, balanced, aggressive, or byte value like 256M)'
        custom_bytes:
          type: integer
          label: 'Custom byte budget (null for named profile)'
        chunk_size:
          type: integer
          label: 'Pages per chunk (null uses profile default)'
    pagefind:
      type: mapping
      label: 'Pagefind configuration'
      mapping:
        build_dir:
          type: string
          label: 'Build directory'
        output_dir:
          type: string
          label: 'Output directory'
        binary:
          type: string
          label: 'Pagefind binary path'
        auto_rebuild:
          type: boolean
          label: 'Auto-rebuild after indexing'
        view_mode:
          type: string
          label: 'Entity view mode for indexing'

search_api.backend.plugin.scolta_pagefind:
  type: mapping
  label: 'Scolta Pagefind backend configuration'
  mapping:
    build_dir:
      type: string
      label: 'Build directory'
    output_dir:
      type: string
      label: 'Pagefind output directory'
    pagefind_binary:
      type: string
      label: 'Pagefind binary path'
    auto_rebuild:
      type: boolean
      label: 'Auto-rebuild index after changes'
    view_mode:
      type: string
      label: 'Entity view mode'
