name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Check out scolta-drupal into 'package/' so that '../scolta-php' resolves correctly
      - uses: actions/checkout@v4
        with:
          path: package

      # Check out scolta-php at the same tag into 'scolta-php/'
      - uses: actions/checkout@v4
        with:
          repository: tag1consulting/scolta-php
          ref: ${{ github.ref_name }}
          path: scolta-php

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl
          coverage: none

      - name: Install dependencies (no dev)
        working-directory: package
        run: composer install --no-dev --prefer-dist --no-interaction

      - name: Create release archive
        working-directory: package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd ..
          mv package scolta-drupal
          zip -r scolta-drupal-${VERSION}.zip scolta-drupal/ \
            --exclude "scolta-drupal/.git*" \
            --exclude "scolta-drupal/tests/*" \
            --exclude "scolta-drupal/node_modules/*" \
            --exclude "scolta-drupal/.claude/*"

      - name: Extract CHANGELOG entry
        working-directory: package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md > ../release-notes.txt
          cat ../release-notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.txt
          files: scolta-drupal-*.zip
          fail_on_unmatched_files: true
