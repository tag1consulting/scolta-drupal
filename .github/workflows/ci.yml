name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - php: '8.2'
            lint: false
          - php: '8.3'
            lint: true
          - php: '8.4'
            lint: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl
          coverage: none

      - name: Replace path repo with GitHub VCS repo
        run: |
          php -r '
            $j = json_decode(file_get_contents("composer.json"), true);
            $j["repositories"] = [["type" => "vcs", "url" => "https://github.com/tag1consulting/scolta-php.git"]];
            $j["require"]["tag1/scolta-php"] = "@dev";
            file_put_contents("composer.json", json_encode($j, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES) . "\n");
          '

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --ignore-platform-req=php

      - name: Lint (Drupal coding standards)
        if: matrix.lint
        run: ./vendor/bin/phpcs --warning-severity=0

      - name: Run tests
        run: composer test

  coverage:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP with Xdebug
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl
          coverage: xdebug

      - name: Replace path repo with GitHub VCS repo
        run: |
          php -r '
            $j = json_decode(file_get_contents("composer.json"), true);
            $j["repositories"] = [["type" => "vcs", "url" => "https://github.com/tag1consulting/scolta-php.git"]];
            $j["require"]["tag1/scolta-php"] = "@dev";
            file_put_contents("composer.json", json_encode($j, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES) . "\n");
          '

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist

      - name: Run tests with coverage
        run: ./vendor/bin/phpunit --coverage-text --colors=never 2>&1 | tail -20

  docs-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md updated when code changes
        run: |
          CODE_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- \
            'src/' 'composer.json' 'tests/' 'config/' 'js/' 'css/' '*.module' '*.install' | head -1)
          if [ -n "$CODE_CHANGED" ]; then
            CHANGELOG_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- CHANGELOG.md)
            if [ -z "$CHANGELOG_CHANGED" ]; then
              echo "FAIL: Code changed but CHANGELOG.md was not updated."
              echo "Please add an entry under ## [Unreleased] in CHANGELOG.md."
              exit 1
            fi
            echo "PASS: CHANGELOG.md updated alongside code changes."
          else
            echo "SKIP: No code changes detected."
          fi

  functional:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl, pdo_sqlite, sqlite3
          coverage: none

      - name: Replace path repo with GitHub VCS repo
        run: |
          php -r '
            $j = json_decode(file_get_contents("composer.json"), true);
            $j["repositories"] = [["type" => "vcs", "url" => "https://github.com/tag1consulting/scolta-php.git"]];
            $j["require"]["tag1/scolta-php"] = "@dev";
            file_put_contents("composer.json", json_encode($j, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES) . "\n");
          '

      - name: Create Drupal 11 project (drupal/drupal includes dev deps + Mink)
        run: |
          composer create-project drupal/drupal:^11 /tmp/drupal \
            --no-interaction --no-install --quiet

      - name: Configure Drupal project to use this module as a path repo
        working-directory: /tmp/drupal
        run: |
          composer config repositories.scolta-drupal path "$GITHUB_WORKSPACE"
          composer config repositories.scolta-php vcs https://github.com/tag1consulting/scolta-php.git

      - name: Install Drupal + scolta + drush
        working-directory: /tmp/drupal
        run: |
          composer require \
            tag1/scolta-drupal:@dev \
            drupal/search_api:^1 \
            drush/drush:^13 \
            --no-interaction --ignore-platform-req=php --quiet

      - name: Ensure module is in the contrib modules path
        working-directory: /tmp/drupal
        run: |
          mkdir -p modules/contrib
          if [ ! -e modules/contrib/scolta ]; then
            ln -sf "$GITHUB_WORKSPACE" modules/contrib/scolta
          fi

      - name: Install Drupal site with SQLite
        working-directory: /tmp/drupal
        run: |
          mkdir -p sites/default/files
          chmod 777 sites/default/files
          ./vendor/bin/drush site:install minimal \
            --db-url="sqlite://localhost/$(pwd)/sites/default/files/test.sqlite" \
            --yes --quiet

      - name: Start PHP built-in web server
        working-directory: /tmp/drupal
        run: |
          php -d display_errors=On -d error_reporting=E_ALL -S localhost:8080 -t . > /tmp/php-server.log 2>&1 &
          until curl -sf http://localhost:8080/ > /dev/null 2>&1; do sleep 1; done

      - name: Run functional tests
        working-directory: /tmp/drupal
        env:
          SIMPLETEST_DB: 'sqlite://localhost//tmp/drupal/sites/default/files/test.sqlite'
          SIMPLETEST_BASE_URL: 'http://localhost:8080'
          BROWSERTEST_OUTPUT_DIRECTORY: '/tmp/browsertest_output'
          SYMFONY_DEPRECATIONS_HELPER: disabled
        run: |
          mkdir -p /tmp/browsertest_output
          ./vendor/bin/phpunit \
            modules/contrib/scolta/tests/src/Functional/ \
            --bootstrap core/tests/bootstrap.php \
            --display-deprecations \
            --testdox

      - name: Dump error info on failure
        if: failure()
        working-directory: /tmp/drupal
        run: |
          echo "=== PHP server log errors ==="
          grep -v "^\[.*\] \[::1\]" /tmp/php-server.log 2>/dev/null | head -30 || echo "(none)"
          echo ""
          echo "=== Drush eval: test settings form build ==="
          ./vendor/bin/drush pm:enable scolta search_api --yes 2>&1 | tail -3 || true
          ./vendor/bin/drush php:eval "
            try {
              \$c = \Drupal::config('scolta.settings');
              \$budget = \Tag1\Scolta\Config\MemoryBudgetConfig::load([
                'profile' => \$c->get('memory_budget.profile') ?? 'conservative',
                'chunk_size' => \$c->get('memory_budget.chunk_size'),
              ]);
              \$f = \Drupal\scolta\Form\MemoryBudgetSettingsFieldSet::build(\$budget);
              echo 'OK: chunk_size key present: ' . (isset(\$f['chunk_size']) ? 'yes' : 'no') . PHP_EOL;
            } catch (\Throwable \$e) {
              echo 'FORM BUILD ERROR: ' . get_class(\$e) . ': ' . \$e->getMessage() . PHP_EOL;
              echo \$e->getTraceAsString() . PHP_EOL;
            }
          " 2>&1 | head -50 || echo "(drush eval failed)"
          echo ""
          echo "=== Hit settings form via curl after login ==="
          LOGIN_URL=$(./vendor/bin/drush user:login 1 --no-browser 2>&1 | tail -1 | tr -d '\r')
          curl -c /tmp/dbg-cookies.txt -b /tmp/dbg-cookies.txt -Ls -o /dev/null "$LOGIN_URL" || true
          curl -s -b /tmp/dbg-cookies.txt "http://localhost:8080/admin/config/search/scolta" 2>/dev/null \
            | grep -oP '(?<=<p>|Exception:|Recoverable error:)[^<]{10,200}' | head -20 \
            || echo "(no exception text found in response)"

  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl
          coverage: none

      - name: Replace path repo with GitHub VCS repo
        run: |
          php -r '
            $j = json_decode(file_get_contents("composer.json"), true);
            $j["repositories"] = [["type" => "vcs", "url" => "https://github.com/tag1consulting/scolta-php.git"]];
            $j["require"]["tag1/scolta-php"] = "@dev";
            file_put_contents("composer.json", json_encode($j, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES) . "\n");
          '

      - name: Install Composer dependencies (copies scolta.css via post-install-cmd)
        run: composer update --no-interaction --prefer-dist --ignore-platform-req=php

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: npm install
        working-directory: tests/playwright

      - name: Install Chromium browser
        run: npx playwright install --with-deps chromium
        working-directory: tests/playwright

      - name: Run Playwright layout tests
        run: npx playwright test
        working-directory: tests/playwright

  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Check version alignment with scolta-php
        run: |
          MY_VERSION=$(php -r "echo json_decode(file_get_contents('composer.json'))->version;")
          MY_MAJOR=$(echo "$MY_VERSION" | cut -d. -f1)
          PHP_CONSTRAINT=$(php -r "echo json_decode(file_get_contents('composer.json'))->require->{'tag1/scolta-php'};")

          echo "My version: $MY_VERSION (major: $MY_MAJOR)"
          echo "scolta-php constraint: $PHP_CONSTRAINT"

          if [ "$PHP_CONSTRAINT" = "@dev" ]; then
            echo "SKIP: Development mode (@dev constraint)"
            exit 0
          fi

          PHP_MAJOR=$(echo "$PHP_CONSTRAINT" | sed 's/[\^~>=<]//g' | cut -d. -f1)
          if [ "$MY_MAJOR" != "$PHP_MAJOR" ]; then
            echo "FAIL: Major version mismatch"
            exit 1
          fi
          echo "PASS: Major versions aligned"
